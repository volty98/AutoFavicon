name: AutoFavicon
version: 1.0.1
description: Automatically inserts favicon.png from media into the HTML head.
icon: plug
author:
  name: volty98
  email: ""
  url: https://github.com/volty98/AutoFavicon
license: MIT
form:
  validation: loose
  fields:
    info:
      type: display
      label: AutoFavicon
      markdown: true
      content: |
        このプラグインはテーマを編集せずに favicon.png を自動挿入します。
        `/user/media/` に `favicon.png` を置くだけで動作します。
        This plugin automatically inserts `favicon.png` from the media folder into the HTML head without editing the theme. Just place `favicon.png` in `/user/media/`, and it will work.
